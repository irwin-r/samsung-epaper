display_preset:
  name: Display Preset
  description: Activate a preset and update the display
  fields:
    preset_name:
      name: Preset Name
      description: Name of the preset to activate
      required: true
      selector:
        text:

display_asset:
  name: Display Asset
  description: Display a specific asset on the ePaper display
  fields:
    asset_id:
      name: Asset ID
      description: ID of the asset to display
      required: true
      selector:
        text:

display_url:
  name: Display URL
  description: Fetch an image from a URL and push to the display
  fields:
    url:
      name: Image URL
      description: URL of the image to display
      required: true
      selector:
        text:
    title:
      name: Title
      description: Optional title for the image
      required: false
      default: "URL Image"
      selector:
        text:

refresh:
  name: Refresh Display
  description: Fetch new content from the active source and update display

create_schedule:
  name: Create Schedule
  description: Create a new schedule that runs a preset on a cron expression
  fields:
    name:
      name: Schedule Name
      description: Human-readable name for the schedule
      required: true
      selector:
        text:
    preset_id:
      name: Preset ID
      description: ID of the preset to run on schedule
      required: true
      selector:
        text:
    cron_expression:
      name: Cron Expression
      description: "Cron expression (minute hour day_of_month month day_of_week)"
      required: true
      selector:
        text:

delete_schedule:
  name: Delete Schedule
  description: Delete a schedule by ID
  fields:
    schedule_id:
      name: Schedule ID
      description: ID of the schedule to delete
      required: true
      selector:
        text:

generate_art:
  name: Generate Art
  description: Generate AI art from a camera snapshot or image file and display it
  fields:
    camera_entity_id:
      name: Camera Entity
      description: Camera entity to take a snapshot from (alternative to image_url)
      required: false
      selector:
        entity:
          domain: camera
    image_url:
      name: Image URL
      description: URL of source image (alternative to camera entity)
      required: false
      selector:
        text:
    art_type:
      name: Art Style
      description: Art generation style (or "random" for surprise)
      required: false
      default: "random"
      selector:
        select:
          options:
            - random
            - tabloid
            - classical
            - popart
            - magazine
            - film_noir
            - tarot
            - currency
            - wanted
            - art_nouveau
            - marble_bust
            - stained_glass
    variant:
      name: Variant
      description: Optional style variant (e.g. "mona_lisa", "time_magazine")
      required: false
      selector:
        text:

generate_frontpage:
  name: Generate Front Page
  description: Fetch and display a real newspaper front page
  fields:
    publication:
      name: Publication
      description: Which newspaper to fetch
      required: false
      default: "smh"
      selector:
        select:
          options:
            - smh
            - the_age
            - the_australian
            - courier_mail
